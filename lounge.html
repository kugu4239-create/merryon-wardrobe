<!-- =====================================================================
     MERRYON 3D LOUNGE — cafe24 단독 페이지
     ---------------------------------------------------------------------
     · @layout 으로 기본 레이아웃(헤더) 위에 얹히는 단독 페이지.
     · 3D 씬을 PC·모바일 모두 화면 상하좌우 100%(풀블리드)로 덮음.
     · CDN 은 @main 고정 → cafe24 코드는 한 번 붙여넣으면 다시 안 고쳐도 됨.
       JS 는 시간버킷 캐시버스트로 배포 후 ~1시간 내 자동 갱신(브라우저 캐시 우회).
       GLB 는 비압축이라 어떤 JS 버전과도 안전하게 로드(깨짐 없음).
     ===================================================================== -->
<!-- 모듈 사전 로드 — three(+애드온) 다운로드를 메인 JS와 병렬화(ESM 워터폴 제거, 무손실).
     wardrobe-site.js 는 importmap 이 이미 있으면 자체 주입을 건너뜀(충돌 없음). -->
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
<link rel="preconnect" href="https://kugu4239-create.github.io">
<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.min.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
} }
</script>
<link rel="modulepreload" href="https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.min.js" crossorigin>
<link rel="modulepreload" href="https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/loaders/GLTFLoader.js" crossorigin>
<link rel="modulepreload" href="https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/postprocessing/EffectComposer.js" crossorigin>
<link rel="modulepreload" href="https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/postprocessing/RenderPass.js" crossorigin>
<link rel="modulepreload" href="https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/postprocessing/ShaderPass.js" crossorigin>
<link rel="modulepreload" href="https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/postprocessing/UnrealBloomPass.js" crossorigin>
<link rel="modulepreload" href="https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/postprocessing/SMAAPass.js" crossorigin>
<link rel="modulepreload" href="https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/postprocessing/OutputPass.js" crossorigin>
<link rel="modulepreload" href="https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/objects/Reflector.js" crossorigin>
<link rel="modulepreload" href="https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/environments/RoomEnvironment.js" crossorigin>
<link rel="modulepreload" href="https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/lights/RectAreaLightUniformsLib.js" crossorigin>
<link rel="modulepreload" href="https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/loaders/RGBELoader.js" crossorigin>
<style>
  /* 이 페이지에선 스크롤/여백 제거 — 3D 가 뷰포트를 꽉 채움 */
  html, body { margin: 0 !important; padding: 0 !important; height: 100%; overflow: hidden; background: #F6F0E4;
    overscroll-behavior: none;   /* 세로 스와이프를 당겨서새로고침/스크롤이 가로채지 않게 */
  }

  /* 단독 풀스크린 페이지 — 상단 띠배너 + Q&A 버튼 + 하단 푸터 숨김(완전 제거) */
  #promotionBanner2, .q6-qna-fab { display: none !important; }
  #footer, .footer, footer, #xans-layout-footer, .xans-layout-footer { display: none !important; }

  /* 3D 컨테이너: 뷰포트 전체 고정(레이아웃 헤더/여백 위로 풀블리드) */
  #merryon3d {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    width: 100vw;
    height: 100vh;     /* 폴백 */
    height: 100dvh;    /* 모바일 주소창 대응 */
    margin: 0; padding: 0;
    background: #F6F0E4;
    overflow: hidden;
    touch-action: none;          /* 가로·세로 드래그(오빗/상하 기울기)를 3D 가 받게 — 스크롤로 안 뺏김 */
    overscroll-behavior: none;
    /* z-index 기본값(미지정) — 헤더/로고가 3D 위로 정상 노출되도록 덮지 않음 */
  }
  #merryon3d > canvas {
    position: absolute; inset: 0;
    width: 100% !important; height: 100% !important;
    display: block; z-index: 0;
    touch-action: none;
  }

  /* 로딩 플레이스홀더(3D 뜨기 전 잠깐) — 러그에 쓰는 merryon 블랙 심볼 로고 */
  #merryon3d .m3d-load {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    background: #F6F0E4; transition: opacity .5s ease; z-index: 1;
  }
  #merryon3d .m3d-load img {
    width: 132px; height: auto;
    animation: m3dPulse 1.6s ease-in-out infinite;
  }
  @keyframes m3dPulse { 0%, 100% { opacity: .5; } 50% { opacity: .92; } }
  /* 로딩 프로그래스바 + 문구 — .m3d-load 안에 있어 로고와 '동시에' 나타나고 사라짐.
     JS(.m3d-prog-bar)가 실제 진행률로 width 를 채움. */
  #merryon3d .m3d-prog {
    position: absolute; left: 50%; top: 58%; transform: translateX(-50%);
    width: 128px; height: 2px; background: rgba(60,57,52,.13); border-radius: 2px; overflow: hidden;
  }
  #merryon3d .m3d-prog-bar { width: 4%; height: 100%; background: #3c3934; border-radius: 2px; transition: width .35s ease; }
  #merryon3d .m3d-prog-note {
    position: absolute; left: 50%; top: 58%; transform: translateX(-50%); margin-top: 12px;
    color: #3c3934; font-family: Pretendard,-apple-system,BlinkMacSystemFont,sans-serif;
    font-size: 11px; font-weight: 500; letter-spacing: .02em; white-space: nowrap;
  }
  #merryon3d.is-ready .m3d-load { opacity: 0; pointer-events: none; }
</style>

<div id="merryon3d">
  <div class="m3d-load">
    <img src="https://cdn.jsdelivr.net/gh/kugu4239-create/merryon-wardrobe@main/assets/products/%EB%B8%94%EB%9E%99%20%EC%8B%AC%EB%B3%BC.png" alt="merryon">
    <div class="m3d-prog"><div class="m3d-prog-bar"></div></div>
    <div class="m3d-prog-note">라운지 입장 중입니다</div>
  </div>
</div>

<script>
(function () {
  // JS 는 GitHub Pages 에서 로드(머지 후 ~1분 반영, 매 로드 고유값으로 항상 최신).
  var JS   = 'https://kugu4239-create.github.io/merryon-wardrobe';
  // 에셋(GLB/이미지)은 jsDelivr(무제한 대역폭, CORS 허용) — 커밋 SHA 로 고정해 영구 immutable 캐시.
  var REPO = 'https://cdn.jsdelivr.net/gh/kugu4239-create/merryon-wardrobe';
  var V = Date.now();

  var box = document.getElementById('merryon3d');
  if (!box) return;

  // 배포 SHA 주입 파일(Pages, 수십 바이트)을 먼저 로드 → jsDelivr 를 @<SHA> 로 고정.
  //  · @SHA = immutable → 전세계 영구 캐시(첫 방문자도 워밍 후 즉시 HIT), purge 불필요, 월 한도 없음.
  //  · 실패하면 @main 으로 폴백(동작 보장).
  var sh = document.createElement('script');
  sh.src = JS + '/asset-sha.js?v=' + V;
  sh.onload = boot; sh.onerror = boot;
  document.head.appendChild(sh);

  function boot() {
    var SHA = window.__MERRYON_ASSET_SHA__ || 'main';
    var CDN = REPO + '@' + SHA;

    window.MERRYON_WARDROBE_CONFIG = {
      container: '#merryon3d',
      assetBase: CDN + '/assets/garments/',
      resolveImage: function (p) { return CDN + '/assets/products/' + p.split('/').pop(); },
      verticalDrag: false   // 자사몰: 세로 드래그 상하기울기 비활성(가로 회전만)
    };

    // 로딩화면은 '렌더 준비 완료(merryon:ready)' 때까지 유지(캔버스 생성 시점 아님)
    var revealed = false;
    function reveal() { if (revealed) return; revealed = true; box.classList.add('is-ready'); }
    box.addEventListener('merryon:ready', reveal);

    var s = document.createElement('script');
    s.src = JS + '/wardrobe-site.js?v=' + V;
    s.async = true;
    s.onload = function () {
      var t = setInterval(function () {
        if (window.__MERRYON_READY__) { reveal(); clearInterval(t); }   // 이벤트 놓쳐도 플래그로 보강
      }, 150);
      setTimeout(function () { reveal(); clearInterval(t); }, 12000);    // 안전장치: 최대 12초 후 페이드
    };
    document.body.appendChild(s);
  }
})();
</script>
