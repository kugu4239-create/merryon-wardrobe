<!-- =====================================================================
     MERRYON 3D LOUNGE — cafe24 단독 페이지
     ---------------------------------------------------------------------
     · @layout 으로 기본 레이아웃(헤더) 위에 얹히는 단독 페이지.
     · 3D 씬을 PC·모바일 모두 화면 상하좌우 100%(풀블리드)로 덮음.
     · CDN 은 @main 고정 → cafe24 코드는 한 번 붙여넣으면 다시 안 고쳐도 됨.
       JS 는 시간버킷 캐시버스트로 배포 후 ~1시간 내 자동 갱신(브라우저 캐시 우회).
       GLB 는 비압축이라 어떤 JS 버전과도 안전하게 로드(깨짐 없음).
     ===================================================================== -->
<style>
  /* 이 페이지에선 스크롤/여백 제거 — 3D 가 뷰포트를 꽉 채움 */
  html, body { margin: 0 !important; padding: 0 !important; height: 100%; overflow: hidden; background: #F6F0E4;
    overscroll-behavior: none;   /* 세로 스와이프를 당겨서새로고침/스크롤이 가로채지 않게 */
  }

  /* 단독 풀스크린 페이지 — 상단 띠배너 + Q&A 버튼 + 하단 푸터 숨김(완전 제거) */
  #promotionBanner2, .q6-qna-fab { display: none !important; }
  #footer, .footer, footer, #xans-layout-footer, .xans-layout-footer { display: none !important; }

  /* 3D 컨테이너: 뷰포트 전체 고정(레이아웃 헤더/여백 위로 풀블리드) */
  #merryon3d {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    width: 100vw;
    height: 100vh;     /* 폴백 */
    height: 100dvh;    /* 모바일 주소창 대응 */
    margin: 0; padding: 0;
    background: #F6F0E4;
    overflow: hidden;
    touch-action: none;          /* 가로·세로 드래그(오빗/상하 기울기)를 3D 가 받게 — 스크롤로 안 뺏김 */
    overscroll-behavior: none;
    /* z-index 기본값(미지정) — 헤더/로고가 3D 위로 정상 노출되도록 덮지 않음 */
  }
  #merryon3d > canvas {
    position: absolute; inset: 0;
    width: 100% !important; height: 100% !important;
    display: block; z-index: 0;
    touch-action: none;
  }

  /* 로딩 플레이스홀더(3D 뜨기 전 잠깐) — 러그에 쓰는 merryon 블랙 심볼 로고 */
  #merryon3d .m3d-load {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    background: #F6F0E4; transition: opacity .5s ease; z-index: 1;
  }
  #merryon3d .m3d-load img {
    width: 132px; height: auto;
    animation: m3dPulse 1.6s ease-in-out infinite;
  }
  @keyframes m3dPulse { 0%, 100% { opacity: .5; } 50% { opacity: .92; } }
  #merryon3d.is-ready .m3d-load { opacity: 0; pointer-events: none; }
</style>

<div id="merryon3d">
  <div class="m3d-load"><img src="https://cdn.jsdelivr.net/gh/kugu4239-create/merryon-wardrobe@main/assets/products/%EB%B8%94%EB%9E%99%20%EC%8B%AC%EB%B3%BC.png" alt="merryon"></div>
</div>

<script>
(function () {
  // 에셋(GLB/이미지)은 jsDelivr(@main, CORS 허용) — 코드 내부 av= 버전으로 캐시.
  var CDN = 'https://cdn.jsdelivr.net/gh/kugu4239-create/merryon-wardrobe@main';
  // JS 는 GitHub Pages 에서 로드 → 머지 후 ~1분이면 안정적 반영(jsDelivr 엣지 지연 회피).
  // + 매 로드 고유값으로 브라우저 캐시도 미사용 → 항상 최신.
  var JS = 'https://kugu4239-create.github.io/merryon-wardrobe';
  var V = Date.now();

  var box = document.getElementById('merryon3d');
  if (!box) return;

  window.MERRYON_WARDROBE_CONFIG = {
    container: '#merryon3d',
    assetBase: CDN + '/assets/garments/',
    resolveImage: function (p) { return CDN + '/assets/products/' + p.split('/').pop(); },
    verticalDrag: false   // 자사몰: 세로 드래그 상하기울기 비활성(가로 회전만)
  };

  var s = document.createElement('script');
  s.src = JS + '/wardrobe-site.js?v=' + V;
  s.async = true;
  s.onload = function () {
    // 캔버스가 생기면 플레이스홀더 페이드아웃
    var t = setInterval(function () {
      if (box.querySelector('canvas')) { box.classList.add('is-ready'); clearInterval(t); }
    }, 120);
    setTimeout(function () { clearInterval(t); }, 8000);
  };
  document.body.appendChild(s);
})();
</script>
