<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>MERRYON · Virtual Powder Room (Demo)</title>
  <style>
    /* --- Cafe24 메인 구조 재현(테스트용) --- */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Serif KR', serif; background: #F6F0E4; }

    /* === main_card1.css 스니펫 === */
    .main_image_1_background {
      position: relative;
      overflow: hidden;
      min-height: 560px;
      background: #F6F0E4;
    }
    .main_image_1_background > canvas {
      position: absolute; inset: 0;
      width: 100% !important; height: 100% !important;
      display: block; z-index: 0;
    }
    .main_image_1_background .main_image_1_overlay {
      position: relative; z-index: 2; pointer-events: none;
    }
    .main_image_1_background .main_image_1_overlay a,
    .main_image_1_background .main_image_1_overlay button { pointer-events: auto; }
    .main_image_1_background_link { position: relative; z-index: 1; }
    @media (max-width: 768px) { .main_image_1_background { min-height: 70vh; } }

    /* 데모 전용: 풀스크린 + 오버레이 카피 */
    .main_image_1_background { min-height: 100vh; }
    .main_image_1_overlay {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-end;
      padding-bottom: 8vh; text-align: center;
      color: #2A3247;
    }
    .main_image_1_overlay h1 {
      font-size: clamp(28px, 5vw, 64px); letter-spacing: 0.35em;
      font-weight: 300; text-shadow: 0 2px 24px rgba(255,255,255,0.6);
    }
    .main_image_1_overlay p {
      margin-top: 14px; letter-spacing: 0.25em; font-size: clamp(11px,1.4vw,15px);
      color: #5A3A33; text-shadow: 0 1px 12px rgba(255,255,255,0.7);
    }
    .main_image_1_overlay a.shop {
      margin-top: 26px; padding: 14px 42px;
      border: 1px solid #C9A96E; color: #C9A96E; letter-spacing: 0.3em;
      text-decoration: none; font-size: 13px; background: rgba(255,255,255,0.25);
      backdrop-filter: blur(2px);
    }
  </style>
</head>
<body>
  <!-- === 기존 Cafe24 구조 (수정 없음) === -->
  <div class="main_image_1_wrapper">
    <a class="main_image_1_background_link" href="#">
      <div class="main_image_1_background">
        <div class="main_image_1_overlay">
          <h1>MERRYON</h1>
          <p>CLASSIC PREPPY · SPRING ATELIER</p>
          <a class="shop" href="#">ENTER THE BOUTIQUE</a>
        </div>
      </div>
    </a>
  </div>

  <!-- === snippet.html 의 2줄 === -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.min.js"></script>
  <script src="./wardrobe-site.js"></script>
</body>
</html>
