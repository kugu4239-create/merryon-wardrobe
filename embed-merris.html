<!-- =====================================================================
     MERRYON 3D 씬 — cafe24 메인 "Merris"(마지막) 섹션 임베드
     ---------------------------------------------------------------------
     · 토글 스냅으로 마지막 섹션에 '완전히 도착한 뒤'에만 3D 를 로드/렌더.
       → 내려가는 스냅 전환은 가볍게 끝나고, 그 다음 3D 가 뜸(전환 지연 없음).
     · three.js / GLB / 이미지(~18MB)는 그때 jsDelivr CDN 에서 로드(초기 로드 0).
     · 화면에서 벗어나면 렌더 루프 자동 정지(씬 내장) → 다른 섹션 스크롤 매끄럽게.
     ===================================================================== -->
<style>
  /* 섹션을 풀뷰포트 높이로 강제(모바일 주소창 대응 dvh) → 3D가 화면 100% 채움 */
  .main06 {
    position: relative !important;
    height: 100vh !important;
    height: 100dvh !important;
    overflow: hidden !important;
  }
  .main06 > *:not(#merryon3d) { display: none !important; }
  #merryon3d.main_image_1_background {
    position: absolute; inset: 0;
    width: 100%; height: 100%; min-height: 0;
    background: #F6F0E4; overflow: hidden;
  }
  #merryon3d > canvas {
    position: absolute; inset: 0;
    width: 100% !important; height: 100% !important; display: block; z-index: 0;
  }
  /* 로딩 플레이스홀더(3D 뜨기 전 잠깐) — 러그에 쓰는 merryon 블랙 심볼 로고 */
  #merryon3d .m3d-load {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    background: #F6F0E4; transition: opacity .5s ease; z-index: 1;
  }
  #merryon3d .m3d-load img {
    width: 132px; height: auto;
    animation: m3dPulse 1.6s ease-in-out infinite;
  }
  @keyframes m3dPulse { 0%, 100% { opacity: .5; } 50% { opacity: .92; } }
  #merryon3d.is-ready .m3d-load { opacity: 0; pointer-events: none; }
  /* 마지막(3D) 섹션에선 상단 띠배너 + Q&A 버튼 숨김(섹션 벗어나면 복귀) */
  body.merris-active #promotionBanner2,
  body.merris-active .q6-qna-fab { display: none !important; }
</style>

<div id="merryon3d" class="main_image_1_background">
  <div class="m3d-load"><img src="https://cdn.jsdelivr.net/gh/kugu4239-create/merryon-wardrobe@main/assets/products/%EB%B8%94%EB%9E%99%20%EC%8B%AC%EB%B3%BC.png" alt="merryon"></div>
  <div class="main_image_1_overlay"></div>
</div>

<script>
(function () {
  var CDN = 'https://cdn.jsdelivr.net/gh/kugu4239-create/merryon-wardrobe@main';

  var sec = document.querySelector('.main06');
  var box = document.getElementById('merryon3d');
  if (!sec || !box) return;
  if (box.parentElement !== sec) sec.appendChild(box);

  var loaded = false, timer = null;
  function load() {
    if (loaded) return; loaded = true;
    window.MERRYON_WARDROBE_CONFIG = {
      container: '#merryon3d',
      assetBase: CDN + '/assets/garments/',
      resolveImage: function (p) { return CDN + '/assets/products/' + p.split('/').pop(); }
    };
    // 로딩화면은 '렌더 준비 완료(merryon:ready)' 때까지 유지
    var revealed = false;
    function reveal() { if (revealed) return; revealed = true; box.classList.add('is-ready'); }
    box.addEventListener('merryon:ready', reveal);

    var s = document.createElement('script');
    s.src = CDN + '/wardrobe-site.js?v=' + Date.now();   // JS 캐시 안 함 — 항상 최신 즉시 반영
    s.async = true;
    s.onload = function () {
      var t = setInterval(function () {
        if (window.__MERRYON_READY__) { reveal(); clearInterval(t); }
      }, 150);
      setTimeout(function () { reveal(); clearInterval(t); }, 12000);
    };
    document.body.appendChild(s);
  }

  if ('IntersectionObserver' in window) {
    // 섹션이 '대부분' 보일 때(=스냅 도착 후)만, 살짝 지연 두고 로드 → 전환 방해 0
    var io = new IntersectionObserver(function (ents) {
      ents.forEach(function (e) {
        if (e.isIntersecting && e.intersectionRatio >= 0.55) {
          clearTimeout(timer);
          timer = setTimeout(function () { load(); io.disconnect(); }, 180);
        } else {
          clearTimeout(timer);
        }
      });
    }, { threshold: [0, 0.55, 0.9] });
    io.observe(sec);

    // 마지막 섹션 활성 동안 상단 띠배너 + Q&A 버튼 숨김(섹션 벗어나면 복귀) — 지속 관찰
    var vis = new IntersectionObserver(function (ents) {
      ents.forEach(function (e) {
        document.body.classList.toggle('merris-active', e.isIntersecting && e.intersectionRatio >= 0.55);
      });
    }, { threshold: [0, 0.55, 0.9] });
    vis.observe(sec);
  } else {
    load();
  }
})();
</script>
