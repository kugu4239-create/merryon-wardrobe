name: jsDelivr warm (@SHA 프리워밍)

# 운영(cafe24)은 에셋을 jsDelivr @<커밋SHA> 로 immutable 고정해서 받는다(영구 캐시·purge 불필요·월 한도 없음).
# 배포 직후 그 SHA 의 배포 파일들을 한 번 GET 해서 jsDelivr 엣지를 미리 데워둠 → 첫 방문자 콜드 MISS 감소.
# (브랜치 @main 은 더 이상 운영에서 참조하지 않으므로 purge 하지 않는다.)

on:
  push:
    branches: [ main ]
    paths:
      - 'assets/**'
      - 'wardrobe-site.js'
  workflow_dispatch:

concurrency:
  group: jsdelivr-warm
  cancel-in-progress: false

jobs:
  warm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Warm deployable assets on jsDelivr (@SHA)
        env:
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          python3 - <<'PY'
          import os, subprocess, urllib.parse, urllib.request
          repo = os.environ['REPO']; sha = os.environ['SHA']

          def deployable(f):
              return f.startswith('assets/') or f == 'wardrobe-site.js'

          try:
              out = subprocess.check_output(['git', 'ls-files'], text=True)
              files = [x for x in out.splitlines() if x and deployable(x)]
          except Exception as e:
              print('ls-files 실패:', e); files = []

          ok = 0
          for f in sorted(set(files)):
              enc = '/'.join(urllib.parse.quote(seg) for seg in f.split('/'))
              url = 'https://cdn.jsdelivr.net/gh/%s@%s/%s' % (repo, sha, enc)
              try:
                  req = urllib.request.Request(url, headers={'User-Agent': 'merryon-warm'})
                  urllib.request.urlopen(req, timeout=60).read()
                  print('warmed:', f); ok += 1
              except Exception as e:
                  print('warn(워밍 실패, 무시):', f, e)
          print('done. warmed =', ok, '/', len(set(files)), 'sha =', sha[:12])
          PY
