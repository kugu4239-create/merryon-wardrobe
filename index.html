<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>MERRYON · Virtual Powder Room</title>
  <link rel="icon" href="data:,">   <!-- favicon 자동요청 404 방지 -->
  <style>
    /* --- Cafe24 메인 구조 재현(미리보기) --- */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Serif KR', serif; background: #F6F0E4; }

    /* === main_card1.css 스니펫 === */
    .main_image_1_background {
      position: relative;
      overflow: hidden;
      min-height: 560px;
      background: #F6F0E4;
    }
    .main_image_1_background > canvas {
      position: absolute; inset: 0;
      width: 100% !important; height: 100% !important;
      display: block; z-index: 0;
    }
    .main_image_1_background .main_image_1_overlay {
      position: relative; z-index: 2; pointer-events: none;
    }
    .main_image_1_background .main_image_1_overlay a,
    .main_image_1_background .main_image_1_overlay button { pointer-events: auto; }
    .main_image_1_background_link { position: relative; z-index: 1; }
    @media (max-width: 768px) { .main_image_1_background { min-height: 70vh; } }

    /* 미리보기: 풀스크린 */
    .main_image_1_background { min-height: 100vh; }
  </style>
</head>
<body>
  <!-- === 기존 Cafe24 구조 (수정 없음) === -->
  <div class="main_image_1_wrapper">
    <div class="main_image_1_background">
      <!-- 오버레이(로고/카피/버튼)는 실제 운영에서 Cafe24 HTML로 덧씌우므로
           미리보기에서는 비워 둠 → 순수 3D 씬만 -->
      <div class="main_image_1_overlay"></div>
    </div>
  </div>

  <!-- === 미리보기 설정: 상품 이미지를 저장소 로컬(assets/products/)에서 로드 ===
       운영(merryon.co.kr)에서는 이 블록이 없으므로 same-origin 원본 경로를 그대로 씀. -->
  <script>
    window.MERRYON_WARDROBE_CONFIG = {
      resolveImage: function (path) {
        return 'assets/products/' + path.split('/').pop();
      }
    };
  </script>

  <!-- === 메인 스크립트 (three 는 wardrobe-site.js 가 CDN 에서 자동 로드) === -->
  <script src="./wardrobe-site.js"></script>
</body>
</html>
